<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Phím Tắt & Accessibility</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 style="margin-bottom:10px;">Phím Tắt Toàn App</h2>
        <p style="color:#666; margin-bottom:20px;">Nhấn <kbd>Ctrl</kbd> + <kbd>K</kbd> để kích hoạt Command Palette tìm kiếm nhanh.</p>

        <h3>Bộ sưu tập ảnh (Phím điều hướng <kbd>←</kbd> <kbd>→</kbd> hoặc <kbd>1-4</kbd>)</h3>
        <div class="gallery">
            <div class="img-box active" data-index="1" aria-label="Hình ảnh phong cảnh số 1"><img src="https://placehold.co/400x250?text=Image+1"></div>
            <div class="img-box" data-index="2" aria-label="Hình ảnh phong cảnh số 2"><img src="https://placehold.co/400x250?text=Image+2"></div>
            <div class="img-box" data-index="3" aria-label="Hình ảnh phong cảnh số 3"><img src="https://placehold.co/400x250?text=Image+3"></div>
            <div class="img-box" data-index="4" aria-label="Hình ảnh phong cảnh số 4"><img src="https://placehold.co/400x250?text=Image+4"></div>
        </div>
        <p id="statusTxt" style="margin-top:10px; font-weight:bold;">Đang chọn ảnh: 1/4</p>
    </div>

    <div id="paletteModal" class="overlay hidden">
        <div class="palette-box">
            <input type="text" id="paletteInput" placeholder="Gõ tên hành động cần tìm kiếm..." aria-label="Tìm kiếm lệnh hệ thống">
            <ul id="commandList"></ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Tài khoản — ShopTLU</title>
</head>
<body>
    <h1>FORM ĐĂNG KÝ TÀI KHOẢN</h1>
    <form action="#" method="POST">
        
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <p>
                <label for="fullname">Họ và tên:</label>
                <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập đầy đủ họ tên">
            </p>
            <p>
                <label for="email">Địa chỉ Email:</label>
                <input type="email" id="email" name="email" required placeholder="vi_du@gmail.com">
            </p>
            <p>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Gồm 10 chữ số">
            </p>
            <p>
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob" max="2026-05-31">
            </p>
            <p>
                <label>Giới tính:</label>
                <label><input type="radio" name="gender" value="Nam"> Nam</label>
                <label><input type="radio" name="gender" value="Nu"> Nữ</label>
                <label><input type="radio" name="gender" value="Khac"> Khác</label>
            </p>
        </fieldset>

        <fieldset>
            <legend>Tài khoản đăng nhập</legend>
            <p>
                <label for="username">Tên tài khoản:</label>
                <input type="text" id="username" name="username" pattern="[a-zA-Z0-9_]{3,20}" placeholder="Chữ, số hoặc dấu gạch dưới">
            </p>
            <p>
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" placeholder="Có chữ hoa và số">
            </p>
            <p>
                <label for="confirm_password">Xác nhận mật khẩu:</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="8" placeholder="Nhập lại y hệt mật khẩu trên">
            </p>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <p>
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">-- Chọn Tỉnh/Thành phố --</option>
                    <option value="hn">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="dn">Đà Nẵng</option>
                    <option value="hp">Hải Phòng</option>
                    <option value="ct">Cần Thơ</option>
                </select>
            </p>
            <p>
                <label for="district">Quận / Huyện:</label>
                <select id="district" name="district">
                    <option value="">-- Chọn Quận/Huyện --</option>
                    <option value="q1">Quận 1</option>
                    <option value="q2">Quận Cầu Giấy</option>
                </select>
            </p>
            <p>
                <label for="address">Địa chỉ chi tiết:</label><br>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường, thôn, xóm..."></textarea>
            </p>
        </fieldset>

        <p>
            <label>
                <input type="checkbox" name="agree" required> Tôi hoàn toàn đồng ý với các điều khoản của cửa hàng
            </label>
        </p>

        <p>
            <button type="submit">ĐĂNG KÝ NGAY</button>
            <button type="reset">LÀM LẠI TỪ ĐẦU</button>
        </p>
    </form>
</body>
</html>

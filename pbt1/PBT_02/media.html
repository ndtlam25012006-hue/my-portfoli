<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Trưng Bày Đa Phương Tiện Sản Phẩm</title>
</head>
<body>
    <header>
        <svg width="100" height="40" style="background:#f0f0f0;">
            <circle cx="25" cy="20" r="15" fill="#ff5722" />
            <rect x="50" y="10" width="40" height="20" fill="#009688" />
        </svg>
        <h1>TRANG TRƯNG BÀY MULTIMEDIA</h1>
    </header>

    <main>
        <section>
            <h2>Hình ảnh sản phẩm nổi bật</h2>
            
            <figure style="display: inline-block; margin: 10px;">
                <img src="https://placehold.co/200x150" alt="Điện thoại iPhone 16 Pro màu Titan tự nhiên" style="max-width: 100%; height: auto;" loading="lazy">
                <figcaption>Mặt trước iPhone 16 Pro</figcaption>
            </figure>

            <figure style="display: inline-block; margin: 10px;">
                <img src="https://placehold.co/200x150" alt="Cạnh bên cụm camera điều khiển mới của iPhone 16" style="max-width: 100%; height: auto;" loading="lazy">
                <figcaption>Nút Camera Control mới</figcaption>
            </figure>

            <figure style="display: inline-block; margin: 10px;">
                <img src="https://placehold.co/200x150" alt="Hộp phụ kiện đi kèm bên trong máy" style="max-width: 100%; height: auto;" loading="lazy">
                <figcaption>Phụ kiện bên trong hộp</figcaption>
            </figure>
        </section>

        <section>
            <h2>Video đánh giá từ YouTube</h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" style="border:none;"></iframe>
        </section>

        <section>
            <h2>Video quảng cáo phiên bản gốc</h2>
            <video width="400" controls poster="https://placehold.co/400x220">
                <source src="movie.mp4" type="video/mp4">
                <source src="movie.webm" type="video/webm">
                Trình duyệt của bạn không hỗ trợ xem video trực tiếp.
            </video>
        </section>

        <section>
            <h2>Nhạc nền giới thiệu sản phẩm (Audio)</h2>
            <audio controls>
                <source src="background-music.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ nghe nhạc.
            </audio>
        </section>
    </main>
</body>
</html>

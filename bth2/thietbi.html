<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Thiết bị Máy tính</title>
    <link rel="stylesheet" href="thietbi.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Quản lý Thiết bị Máy tính</h2>
            <div class="lang-switch">
                <button class="active">Tiếng Việt</button>
                <button>English</button>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn-primary" onclick="openModal()">Thêm Thiết bị</button>
            <input type="text" placeholder="Tìm kiếm thiết bị...">
        </div>

        <div class="grid-container" id="deviceGrid">
            </div>
    </div>

    <div class="modal" id="deviceModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>Thêm Thiết bị</h3>
            <form id="deviceForm" onsubmit="saveDevice(event)">
                <div class="form-group">
                    <label>Tên thiết bị</label>
                    <input type="text" id="deviceName" required>
                </div>
                <div class="form-group">
                    <label>Số Serial</label>
                    <input type="text" id="deviceSerial" required>
                </div>
                <div class="form-group">
                    <label>Loại</label>
                    <select id="deviceType">
                        <option value="Máy bán">Máy bán</option>
                        <option value="Laptop">Laptop</option>
                        <option value="Màn hình">Màn hình</option>
                        <option value="Máy in">Máy in</option>
                        <option value="Máy chủ">Máy chủ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ngày Mua</label>
                    <input type="date" id="deviceDate" required>
                </div>
                <div class="form-group">
                    <label>Bảo Hành</label>
                    <select id="deviceWarranty">
                        <option value="1 năm">1 năm</option>
                        <option value="2 năm">2 năm</option>
                        <option value="3 năm">3 năm</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email Quản Lý</label>
                    <input type="email" id="deviceEmail" required>
                </div>
                <div class="form-group">
                    <label>Trạng Thái</label>
                    <select id="deviceStatus">
                        <option value="Hoạt động">Hoạt động</option>
                        <option value="Không hoạt động">Không hoạt động</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="thietbi.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đồ án tốt nghiệp</title>
    <link rel="stylesheet" href="doan.css">
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <h2>Chào mừng đến với Đồ án tốt nghiệp</h2>
            <div class="stats-container">
                <div class="stat-box">Tổng số đồ án <br> <strong>228</strong></div>
                <div class="stat-box">Hoàn thành <br> <strong>213</strong></div>
                <div class="stat-box">Đang làm <br> <strong>15</strong></div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn-primary" onclick="openModal()">Thêm Đồ án</button>
            <input type="text" placeholder="Tìm sinh viên hoặc đề tài...">
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Tiêu đề Đồ án</th>
                    <th>Sinh viên</th>
                    <th>Email</th>
                    <th>Điện thoại</th>
                    <th>Giảng viên HD</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="thesisTableBody">
                </tbody>
        </table>
    </div>

    <div class="modal" id="thesisModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>Thêm/Sửa Đồ án</h3>
            <form id="thesisForm" onsubmit="saveThesis(event)">
                <div class="form-group">
                    <label>Tiêu đề Đồ án</label>
                    <input type="text" id="thesisTitle" required>
                </div>
                <div class="form-group">
                    <label>Tên Sinh viên</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="studentEmail" required>
                </div>
                <div class="form-group">
                    <label>Điện thoại</label>
                    <input type="text" id="studentPhone" required>
                </div>
                <div class="form-group">
                    <label>Giảng viên HD</label>
                    <select id="advisor">
                        <option value="TS. Trần B">TS. Trần B</option>
                        <option value="ThS. Lê D">ThS. Lê D</option>
                        <option value="TS. Hoàng F">TS. Hoàng F</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Đóng</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="doan.js"></script>
</body>
</html>

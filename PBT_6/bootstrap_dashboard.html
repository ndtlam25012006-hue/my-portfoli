<!DOCTYPE html>
<html lang="vi">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Dashboard</title>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block bg-light vh-100 p-3">
            <ul class="list-group list-group-flush">
                <li class="list-group-item">Dashboard</li>
                <li class="list-group-item">Đơn hàng</li>
            </ul>
        </nav>
        <main class="col-md-10 p-4">
            <div class="row mb-4">
                <div class="col-md-3"><div class="card bg-primary text-white p-3">Tổng đơn: 100</div></div>
                <div class="col-md-3"><div class="card bg-success text-white p-3">Doanh thu: 20tr</div></div>
                <div class="col-md-3"><div class="card bg-warning text-white p-3">Đang chờ: 5</div></div>
                <div class="col-md-3"><div class="card bg-danger text-white p-3">Hủy: 2</div></div>
            </div>
            <table class="table table-striped table-hover">
                <thead><tr><th>ID</th><th>Sản phẩm</th><th>Trạng thái</th></tr></thead>
                <tbody><tr><td>1</td><td>Laptop</td><td>Đã giao</td></tr></tbody>
            </table>
            <div class="accordion" id="faq">
                <div class="accordion-item">
                    <h2 class="accordion-header"><button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#q1">FAQ?</button></h2>
                    <div id="q1" class="accordion-collapse collapse" data-bs-parent="#faq"><div class="accordion-body">Trả lời đây.</div></div>
                </div>
            </div>
            <div class="alert alert-success mt-3">Thao tác thành công!</div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiệu ứng CSS</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="animation-container">
        <div class="loading-spinner"></div>
        
        <div class="animated-product-card">
            <div class="zoom-image-wrapper">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="Sản phẩm">
            </div>
            <div class="card-details">
                <h4>Sản phẩm cao cấp</h4>
                <p>Hiệu ứng mượt mà, trải nghiệm đỉnh cao.</p>
                <button class="action-btn">Mua ngay</button>
            </div>
        </div>
    </div>

</body>
</html>
